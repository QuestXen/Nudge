name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install

      # Tag-Format: v1.0.2 (normal) oder v1.0.2-critical (kritisch)
      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *"-critical" ]]; then
            VERSION="${TAG#v}"
            VERSION="${VERSION%-critical}"
            CRITICAL=true
          else
            VERSION="${TAG#v}"
            CRITICAL=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      # Tauri v2 NSIS mit createUpdaterArtifacts erzeugt:
      #   nudge_X.X.X_x64-setup.exe      → Installer (auch Update-Paket für den Updater)
      #   nudge_X.X.X_x64-setup.exe.sig  → Signatur (Pflicht für den Updater-Vertrauenscheck)
      # .sig wird NUR erzeugt wenn TAURI_SIGNING_PRIVATE_KEY gesetzt ist!
      - name: Find build artifacts
        id: artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"

          echo "=== Inhalt von $BUNDLE_DIR ==="
          ls -la "$BUNDLE_DIR" 2>/dev/null || echo "(Verzeichnis nicht gefunden)"
          echo "=============================="

          # Installer (.exe) — wird vom Updater heruntergeladen
          INSTALLER=$(ls "$BUNDLE_DIR"/*.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "❌ Kein NSIS Installer (.exe) gefunden!"
            exit 1
          fi

          # Signatur (.exe.sig) — Pflicht für den Updater-Vertrauenscheck
          SIG=$(ls "$BUNDLE_DIR"/*.exe.sig 2>/dev/null | head -1)
          if [ -z "$SIG" ]; then
            echo ""
            echo "❌ Keine .exe.sig Datei gefunden!"
            echo "   → Ist TAURI_SIGNING_PRIVATE_KEY in den GitHub Secrets gesetzt?"
            echo ""
            exit 1
          fi

          echo "installer=$INSTALLER"                             >> $GITHUB_OUTPUT
          echo "sig=$SIG"                                         >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$INSTALLER")"          >> $GITHUB_OUTPUT

          echo "✅ Installer: $INSTALLER"
          echo "✅ Sig:       $SIG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: v${{ steps.tag.outputs.version }}
          body: |
            ## Release v${{ steps.tag.outputs.version }}

            ${{ steps.tag.outputs.critical == 'true' && '> ⚠️ **CRITICAL UPDATE** – Sofortige Installation erforderlich!' || 'Routine-Update mit Verbesserungen und Fehlerbehebungen.' }}
          files: |
            ${{ steps.artifacts.outputs.installer }}
            ${{ steps.artifacts.outputs.sig }}

      - name: Update Gist (latest.json)
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          # ZIP_NAME → Tauri-Updater lädt .nsis.zip, nicht .exe
          ZIP_NAME: ${{ steps.artifacts.outputs.zip_name }}
          CRITICAL: ${{ steps.tag.outputs.critical }}
          SIG_PATH: ${{ steps.artifacts.outputs.sig }}
        run: node scripts/update-gist.js
