name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install

      # Tag-Format: v1.0.2 (normal) oder v1.0.2-critical (kritisch)
      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *"-critical" ]]; then
            VERSION="${TAG#v}"
            VERSION="${VERSION%-critical}"
            CRITICAL=true
          else
            VERSION="${TAG#v}"
            CRITICAL=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Find build artifacts
        id: artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          INSTALLER=$(ls "$BUNDLE_DIR"/*.exe | head -1)
          SIG=$(ls "$BUNDLE_DIR"/*.sig | head -1)
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "sig=$SIG" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$INSTALLER")" >> $GITHUB_OUTPUT
          echo "Found installer: $INSTALLER"
          echo "Found sig: $SIG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: v${{ steps.tag.outputs.version }}
          body: |
            ## Release v${{ steps.tag.outputs.version }}

            ${{ steps.tag.outputs.critical == 'true' && '> ⚠️ **CRITICAL UPDATE** – Sofortige Installation erforderlich!' || 'Routine-Update mit Verbesserungen und Fehlerbehebungen.' }}
          files: |
            ${{ steps.artifacts.outputs.installer }}
            ${{ steps.artifacts.outputs.sig }}

      - name: Update Gist (latest.json)
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          INSTALLER_NAME: ${{ steps.artifacts.outputs.installer_name }}
          CRITICAL: ${{ steps.tag.outputs.critical }}
          SIG_PATH: ${{ steps.artifacts.outputs.sig }}
        run: node scripts/update-gist.js
